<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nourish</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f5f0;color:#1a1a18;min-height:100vh}
:root{
  --green:#3B6D11;--green-light:#EAF3DE;--green-mid:#639922;
  --amber:#854F0B;--amber-light:#FAEEDA;--amber-mid:#BA7517;
  --teal:#0F6E56;--teal-light:#E1F5EE;--teal-mid:#1D9E75;
  --coral:#993C1D;--coral-light:#FAECE7;--coral-mid:#D85A30;
  --purple:#3C3489;--purple-light:#EEEDFE;--purple-mid:#7F77DD;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;
  --gray:#5F5E5A;--gray-light:#F1EFE8;--border:rgba(26,26,24,0.12);
  --card:#fff;--radius:14px
}
h1,h2,h3,h4{font-family:'DM Serif Display',serif;font-weight:400}
.app{max-width:660px;margin:0 auto;padding:0 16px 100px}
.header{padding:28px 0 16px;display:flex;align-items:baseline;justify-content:space-between}
.header h1{font-size:30px;letter-spacing:-.5px}
.date-label{font-size:13px;color:var(--gray)}
.nav{display:flex;gap:3px;margin-bottom:22px;background:var(--gray-light);border-radius:10px;padding:4px}
.nav button{flex:1;padding:7px 4px;border:none;background:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav button.active{background:#fff;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.summary-card{background:var(--card);border-radius:var(--radius);border:.5px solid var(--border);padding:14px}
.summary-card.wide{grid-column:1/-1}
.s-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.s-value{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
.s-sub{font-size:12px;color:var(--gray);margin-top:3px}
.progress-bar{height:5px;background:var(--gray-light);border-radius:99px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.macro-card{background:var(--card);border-radius:var(--radius);border:.5px solid var(--border);padding:12px;text-align:center}
.m-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.m-val{font-size:18px;font-weight:500}
.m-goal{font-size:11px;color:var(--gray)}
.macro-card.protein .m-val{color:var(--coral)}
.macro-card.carbs .m-val{color:var(--amber)}
.macro-card.fat .m-val{color:var(--teal)}
.micro-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.micro-chip{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.mc-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-val{font-size:15px;font-weight:500}
.custom-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-header h2{font-size:19px}
.btn-add{background:#1a1a18;color:#fff;border:none;border-radius:99px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-add:hover{background:#333}
.entry-list{display:flex;flex-direction:column;gap:7px}
.entry-item{background:var(--card);border-radius:12px;border:.5px solid var(--border);padding:12px 14px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}
.entry-name{font-weight:500;font-size:14px}
.entry-meta{font-size:11px;color:var(--gray);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.entry-cals{font-family:'DM Serif Display',serif;font-size:20px;text-align:right}
.entry-delete{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;padding:0 0 0 6px;line-height:1;transition:color .15s}
.entry-delete:hover{color:var(--coral)}
.empty-state{text-align:center;padding:36px 16px;color:var(--gray);font-size:14px}
.pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500}
.pill.protein{background:var(--coral-light);color:var(--coral)}
.pill.carbs{background:var(--amber-light);color:var(--amber)}
.pill.fat{background:var(--teal-light);color:var(--teal)}
.pill.prep{background:var(--purple-light);color:var(--purple)}
.pill.other{background:var(--blue-light);color:var(--blue)}
.foods-search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--card);outline:none;margin-bottom:12px}
.foods-search:focus{border-color:#1a1a18}
.foods-list{display:flex;flex-direction:column;gap:7px}
.food-item{background:var(--card);border-radius:12px;border:.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.food-info .food-name{font-weight:500;font-size:14px}
.food-info .food-meta{font-size:11px;color:var(--gray);margin-top:2px}
.food-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-log{background:var(--green-light);color:var(--green);border:none;padding:5px 12px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.btn-edit-food{background:var(--blue-light);color:var(--blue);border:none;padding:5px 10px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.btn-del-food{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px}
.btn-del-food:hover{color:var(--coral)}
.btn-duplicate-food{background:var(--amber-light);color:var(--amber);border:none;padding:5px 10px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:none;border:.5px solid var(--border);border-radius:8px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-dow{text-align:center;font-size:11px;color:var(--gray);padding-bottom:4px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:.5px solid transparent;transition:all .12s}
.cal-day.empty{cursor:default;pointer-events:none}
.cal-day.today{border-color:var(--border);font-weight:500}
.cal-day.selected{border-color:#1a1a18;background:#1a1a18;color:#fff}
.cal-day.has-data .cal-dot{width:4px;height:4px;border-radius:50%;background:var(--green-mid);margin-top:2px}
.cal-day:not(.empty):not(.selected):hover{background:var(--gray-light)}
.cal-day-num{font-size:12px;line-height:1}
.hist-detail-card{background:var(--card);border-radius:var(--radius);border:.5px solid var(--border)}
.hist-detail-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--border)}
.hist-detail-header h3{font-size:17px}
.hist-detail-body{padding:14px 16px}
.hist-macro-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.hist-macro{flex:1;text-align:center;min-width:50px;background:var(--gray-light);border-radius:10px;padding:8px 4px}
.hist-macro .hm-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.04em}
.hist-macro .hm-val{font-size:14px;font-weight:500;margin-top:2px}
.hist-entry{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px}
.hist-entry:last-child{border-bottom:none}
.hist-entry-name{font-weight:500}
.hist-entry-serving{font-size:11px;color:var(--gray)}
.hist-entry-cals{font-weight:500;white-space:nowrap}
.btn-hist-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 0 0 4px;line-height:1}
.btn-hist-del:hover{color:var(--coral)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto}
.modal h3{font-size:20px;margin-bottom:16px}
.modal-tabs{display:flex;gap:3px;background:var(--gray-light);border-radius:8px;padding:3px;margin-bottom:16px}
.modal-tab{flex:1;padding:6px;border:none;background:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer}
.modal-tab.active{background:#fff;color:#1a1a18}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-box h4{font-size:18px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--gray);margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:8px}
.btn-confirm-cancel{flex:1;background:var(--gray-light);color:#1a1a18;border:none;padding:11px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.btn-confirm-delete{flex:1;background:#E24B4A;color:#fff;border:none;padding:11px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--gray-light);outline:none}
.form-group input:focus,.form-group select:focus{border-color:#1a1a18;background:#fff}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.form-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.form-actions{display:flex;gap:8px;margin-top:16px}
.btn-primary{flex:1;background:#1a1a18;color:#fff;border:none;padding:12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.btn-secondary{flex:1;background:var(--gray-light);color:#1a1a18;border:none;padding:12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:.5px solid var(--border);margin-top:4px}
.toggle-label{font-size:13px;font-weight:500}
.toggle-sub{font-size:11px;color:var(--gray);margin-top:1px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:99px;cursor:pointer;transition:.2s}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--green-mid)}
.toggle input:checked+.slider:before{transform:translateX(18px)}
.serving-input-row{display:flex;align-items:center;gap:8px;margin-top:6px;padding:10px;background:var(--green-light);border-radius:8px}
.serving-input-row label{font-size:13px;color:var(--green);font-weight:500}
.serving-input-row input{width:60px;padding:5px 8px;border:1px solid rgba(59,109,17,.3);border-radius:6px;font-size:14px;font-weight:500;text-align:center;background:#fff;outline:none}
.ingredient-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ingredient-row{background:var(--gray-light);border-radius:10px;padding:10px 12px}
.ing-row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ing-title{font-size:13px;font-weight:500}
.ing-subtitle{font-size:11px;color:var(--gray);margin-top:1px}
.ing-row-actions{display:flex;gap:6px;flex-shrink:0}
.btn-ing-edit{background:none;border:.5px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;color:var(--blue)}
.btn-ing-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:15px;line-height:1}
.btn-ing-del:hover{color:var(--coral)}
.ing-other-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ing-other-pill{font-size:10px;background:var(--blue-light);color:var(--blue);padding:1px 6px;border-radius:99px}
.recipe-import-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;padding:6px;border:.5px solid var(--border);border-radius:10px;background:var(--card);margin-top:6px;margin-bottom:8px}
.recipe-import-item{padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s}
.recipe-import-item:hover{background:var(--gray-light)}
.recipe-import-item .ri-name{font-size:13px;font-weight:500}
.recipe-import-item .ri-meta{font-size:11px;color:var(--gray);margin-top:1px}
.add-ing-section{background:var(--gray-light);border-radius:12px;padding:14px;margin-bottom:10px}
.add-ing-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.add-ing-section-header h4{font-size:14px;color:var(--gray)}
.section-divider{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px;padding-top:10px;border-top:.5px solid rgba(26,26,24,.1)}
.recipe-totals{background:var(--green-light);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap}
.rt-item{font-size:12px}
.rt-label{color:var(--green);font-weight:500}
.goals-form{background:var(--card);border-radius:var(--radius);border:.5px solid var(--border);padding:18px}
.goals-form h3{font-size:18px;margin-bottom:14px}
.goals-section-label{font-size:11px;font-weight:500;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px;padding-top:12px;border-top:.5px solid var(--border)}
.btn-save{background:#1a1a18;color:#fff;border:none;padding:11px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:14px}
.vis-row{display:grid;grid-template-columns:1fr 120px 44px;gap:8px;align-items:center;margin-bottom:8px}
.vis-row-label{font-size:13px;font-weight:500}
.vis-row input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--gray-light);outline:none}
.vis-row input:focus{border-color:#1a1a18;background:#fff}
.vis-row input::placeholder{color:#bbb}
.vis-toggle{display:flex;align-items:center;justify-content:center}
.goal-row{display:grid;grid-template-columns:1fr 120px 44px 36px;gap:8px;align-items:center;margin-bottom:8px}
.goal-row-label{font-size:13px;font-weight:500}
.goal-row input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--gray-light);outline:none}
.goal-row input::placeholder{color:#bbb}
.btn-rm-goal{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px}
.btn-rm-goal:hover{color:var(--coral)}
.food-select-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;margin-bottom:10px}
.food-select-item{padding:10px 12px;background:var(--gray-light);border-radius:8px;cursor:pointer;transition:background .12s}
.food-select-item:hover{background:#e8e5df}
.food-select-item.sel{background:#1a1a18;color:#fff}
.food-select-item .fs-name{font-weight:500;font-size:14px}
.food-select-item .fs-meta{font-size:11px;opacity:.7;margin-top:1px}
.other-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.other-row{display:grid;grid-template-columns:1fr 90px 54px auto;gap:6px;align-items:center}
.other-row input{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--gray-light);outline:none}
.other-row input:focus{border-color:#1a1a18;background:#fff}
.btn-remove-other{background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;padding:0 4px}
.btn-add-other{background:none;border:.5px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;color:var(--gray)}
.data-section{background:var(--card);border-radius:var(--radius);border:.5px solid var(--border);padding:18px;margin-top:16px}
.data-section h3{font-size:18px;margin-bottom:12px}
.data-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-export{background:var(--green-light);color:var(--green);border:none;padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-import{background:var(--blue-light);color:var(--blue);border:none;padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.import-note{font-size:12px;color:var(--gray);margin-top:8px}
.mini-toggle{position:relative;width:32px;height:18px;flex-shrink:0}
.mini-toggle input{opacity:0;width:0;height:0}
.mini-slider{position:absolute;inset:0;background:#ccc;border-radius:99px;cursor:pointer;transition:.2s}
.mini-slider:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.mini-toggle input:checked+.mini-slider{background:var(--green-mid)}
.mini-toggle input:checked+.mini-slider:before{transform:translateX(14px)}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>Nourish</h1><span class="date-label" id="today-date"></span></div>
  <nav class="nav">
    <button class="active" data-tab="today" onclick="switchTab('today')">Today</button>
    <button data-tab="foods" onclick="switchTab('foods')">My Foods</button>
    <button data-tab="goals" onclick="switchTab('goals')">Goals</button>
    <button data-tab="history" onclick="switchTab('history')">History</button>
  </nav>
  <div id="tab-today"></div>
  <div id="tab-foods" style="display:none"></div>
  <div id="tab-goals" style="display:none"></div>
  <div id="tab-history" style="display:none"></div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-overlay" class="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <h4 id="confirm-title">Are you sure?</h4>
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" onclick="confirmCancel()">Cancel</button>
      <button class="btn-confirm-delete" id="confirm-ok-btn" onclick="confirmOk()">Delete</button>
    </div>
  </div>
</div>

<!-- Log Modal -->
<div id="modal-log" class="modal-overlay" style="display:none" onclick="closeModal('modal-log')">
<div class="modal" onclick="event.stopPropagation()">
  <h3 id="log-modal-title">Log food</h3>
  <!-- Top quick-log bar: appears once a food is selected -->
  <div id="log-top-actions" style="display:none;margin-bottom:14px">
    <div id="log-selected-label" style="font-size:13px;font-weight:500;color:var(--green);margin-bottom:8px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" style="flex:1;padding:10px" onclick="closeModal('modal-log')">Cancel</button>
      <button class="btn-primary" style="flex:1;padding:10px" onclick="saveLog()">Log it</button>
    </div>
  </div>
  <!-- Search + food list -->
  <div id="log-food-selector">
    <input id="log-search-input" class="foods-search" placeholder="Search your foods&hellip;" oninput="filterLogFoods(this.value)" style="margin-bottom:8px"/>
    <div class="food-select-list" id="log-food-list" style="max-height:260px"></div>
    <div id="log-empty-foods" style="display:none;text-align:center;padding:20px;color:var(--gray);font-size:13px">No foods saved yet. Add some in My Foods first.</div>
  </div>
  <!-- Prep serving selector -->
  <div id="log-serving-section" style="display:none">
    <div class="serving-input-row">
      <label>Servings to log:</label>
      <input id="log-servings-count" type="number" value="1" min="0.25" step="0.25"/>
      <span id="log-servings-desc" style="font-size:12px;color:var(--green)"></span>
    </div>
  </div>
  <!-- Bottom bar always visible; Log it enabled only once food selected -->
  <div id="log-bottom-actions" class="form-actions" style="margin-top:12px">
    <button class="btn-secondary" onclick="closeModal('modal-log')">Cancel</button>
    <button class="btn-primary" id="log-bottom-log-btn" onclick="saveLog()" style="opacity:.35;cursor:default" disabled>Select a food above</button>
  </div>
</div>
</div>

<script>
// ---- Local date (never UTC) ----
function localDateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const TODAY=localDateStr(new Date());

const ld=k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

const CORE_FIELDS=['calories','protein','carbs','fat','fiber','sugar','sodium','potassium','cholesterol','calcium','vitc','iron'];
const DEFAULT_VIS={calories:true,protein:true,carbs:true,fat:true,fiber:true,sugar:true,sodium:true,potassium:true,cholesterol:true,calcium:true,vitc:true,iron:true};

let state={
  foods:ld('n3_foods')||[],
  goals:ld('n3_goals')||{calories:2000,protein:150,carbs:200,fat:65,fiber:25,sugar:50,sodium:2300,potassium:3500,cholesterol:300,calcium:1000,vitc:90,iron:18,custom:[],vis:{...DEFAULT_VIS}},
};
if(!state.goals.custom)state.goals.custom=[];
if(!state.goals.vis)state.goals.vis={...DEFAULT_VIS};
CORE_FIELDS.forEach(f=>{if(state.goals.vis[f]===undefined)state.goals.vis[f]=true;});
if(state.goals.cholesterol===undefined)state.goals.cholesterol=300;
if(state.goals.calcium===undefined)state.goals.calcium=1000;
if(state.goals.vis.cholesterol===undefined)state.goals.vis.cholesterol=true;
if(state.goals.vis.calcium===undefined)state.goals.vis.calcium=true;

function getLog(d){return ld('n3_log_'+d)||[]}
function setLog(d,l){sv('n3_log_'+d,l)}
function persist(){sv('n3_foods',state.foods);sv('n3_goals',state.goals)}

function zeroCore(){return CORE_FIELDS.reduce((a,f)=>(a[f]=0,a),{})}
function totalsOf(log){
  const acc=zeroCore();const custom={};
  log.forEach(e=>{
    CORE_FIELDS.forEach(f=>acc[f]+=(+e[f]||0));
    (e.other||[]).forEach(o=>{
      const k=o.name.toLowerCase().trim();
      if(!custom[k])custom[k]={name:o.name,unit:o.unit,val:0};
      custom[k].val+=+o.value||0;
    });
  });
  return{core:acc,custom};
}
function n(v){return Math.round(v*10)/10}
function ni(v){return Math.round(v)}
function pct(v,g){return Math.min(100,ni((v/(g||1))*100))}
function isVis(k){return state.goals.vis[k]!==false}
function fmtDate(ds){return new Date(ds+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fmtDateShort(ds){return new Date(ds+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}

/* ---- Confirm ---- */
let _confirmCb=null;
function confirmDialog(title,msg,cb,okLabel){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-ok-btn').textContent=okLabel||'Delete';
  _confirmCb=cb;document.getElementById('confirm-overlay').style.display='flex';
}
function confirmOk(){document.getElementById('confirm-overlay').style.display='none';if(_confirmCb)_confirmCb();_confirmCb=null;}
function confirmCancel(){document.getElementById('confirm-overlay').style.display='none';_confirmCb=null;}

/* ---- Today ---- */
function renderToday(){
  const log=getLog(TODAY);
  const{core:t,custom}=totalsOf(log);
  const g=state.goals;
  const rem=Math.max(0,(g.calories||0)-t.calories);
  const cp=g.calories?pct(t.calories,g.calories):0;
  const cc=cp>100?'#E24B4A':cp>85?'#BA7517':'#3B6D11';

  const calCard=isVis('calories')?`<div class="summary-card wide">
    <div class="s-label">Calories today</div>
    <div class="s-value">${ni(t.calories)}${g.calories?` <span style="font-size:15px;color:var(--gray);font-family:'DM Sans',sans-serif">/ ${g.calories}</span>`:''}</div>
    <div class="s-sub">${g.calories?ni(rem)+' kcal remaining':'tracking'}</div>
    ${g.calories?`<div class="progress-bar"><div class="progress-fill" style="width:${cp}%;background:${cc}"></div></div>`:''}
  </div>`:'';
  const fiberCard=isVis('fiber')?`<div class="summary-card"><div class="s-label">Fiber</div><div class="s-value" style="font-size:22px">${ni(t.fiber)}g</div><div class="s-sub">${g.fiber?'goal '+g.fiber+'g':'tracking'}</div></div>`:'';
  const sugarCard=isVis('sugar')?`<div class="summary-card"><div class="s-label">Sugar</div><div class="s-value" style="font-size:22px">${ni(t.sugar)}g</div><div class="s-sub">${g.sugar?'limit '+g.sugar+'g':'tracking'}</div></div>`:'';

  const macros=[
    {key:'protein',label:'Protein',val:t.protein,goal:g.protein,cls:'protein',color:'var(--coral-mid)'},
    {key:'carbs',label:'Carbs',val:t.carbs,goal:g.carbs,cls:'carbs',color:'var(--amber-mid)'},
    {key:'fat',label:'Fat',val:t.fat,goal:g.fat,cls:'fat',color:'var(--teal-mid)'},
  ].filter(m=>isVis(m.key));
  const macroRow=macros.length?`<div class="macro-row" style="grid-template-columns:repeat(${macros.length},1fr)">${macros.map(m=>`
    <div class="macro-card ${m.cls}"><div class="m-label">${m.label}</div><div class="m-val">${ni(m.val)}g</div>
    <div class="m-goal">${m.goal?'/ '+m.goal+'g':'tracking'}</div>
    ${m.goal?`<div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct(m.val,m.goal)}%;background:${m.color}"></div></div>`:''}
    </div>`).join('')}</div>`:'' ;

  const microDefs=[
    {key:'sodium',label:'Sodium',val:t.sodium,unit:'mg'},
    {key:'potassium',label:'Potassium',val:t.potassium,unit:'mg'},
    {key:'cholesterol',label:'Cholesterol',val:t.cholesterol,unit:'mg'},
    {key:'calcium',label:'Calcium',val:t.calcium,unit:'mg'},
    {key:'vitc',label:'Vit C',val:t.vitc,unit:'mg'},
    {key:'iron',label:'Iron',val:t.iron,unit:'mg'},
  ].filter(m=>isVis(m.key));
  const microStrip=microDefs.length?`<div class="micro-strip" style="grid-template-columns:repeat(${Math.min(4,microDefs.length)},1fr)">${microDefs.map(m=>`
    <div class="micro-chip"><div class="mc-label">${m.label}</div><div class="mc-val">${ni(m.val)}<span style="font-size:10px;color:var(--gray)">${m.unit}</span></div></div>`).join('')}</div>`:'';

  const customGoalMap={};(g.custom||[]).forEach(cg=>customGoalMap[cg.name.toLowerCase().trim()]=cg);
  const customKeys=new Set([...Object.keys(custom),...Object.keys(customGoalMap)]);
  const visCustomKeys=[...customKeys].filter(k=>{const cg=customGoalMap[k];return cg?isVis('custom_'+k):true;});
  let customChips='';
  visCustomKeys.forEach(k=>{
    const tracked=custom[k];const goal=customGoalMap[k];
    const val=tracked?tracked.val:0;const unit=tracked?tracked.unit:(goal?goal.unit:'');
    const label=tracked?tracked.name:(goal?goal.name:k);
    const goalStr=goal&&goal.goal?' / '+goal.goal+unit:'';
    customChips+=`<div class="micro-chip"><div class="mc-label" title="${label}">${label}</div><div class="mc-val">${n(val)}<span style="font-size:10px;color:var(--gray)">${unit}</span></div><div style="font-size:10px;color:var(--gray)">${goalStr||'tracking'}</div></div>`;
  });

  const entries=log.length===0
    ?`<div class="empty-state">No entries yet &mdash; log your first meal.</div>`
    :log.map((e,i)=>`<div class="entry-item">
      <div>
        <div class="entry-name">${e.name}</div>
        <div class="entry-meta">${e.serving?'<span>'+e.serving+'</span>':''}
          ${e.isPrep?`<span class="pill prep">${e.servingsLogged||1}x</span>`:''}
          ${e.other&&e.other.length?`<span class="pill other">${e.other.length} other</span>`:''}
          <span class="pill protein">${ni(e.protein)}g P</span>
          <span class="pill carbs">${ni(e.carbs)}g C</span>
          <span class="pill fat">${ni(e.fat)}g F</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span class="entry-cals">${ni(e.calories)}</span>
        <button class="entry-delete" onclick="confirmDeleteLog('${TODAY}',${i})" title="Remove">&#10005;</button>
      </div>
    </div>`).join('');

  document.getElementById('tab-today').innerHTML=`
    ${(calCard||fiberCard||sugarCard)?`<div class="summary-grid">${calCard}${fiberCard}${sugarCard}</div>`:''}
    ${macroRow}${microStrip}
    ${visCustomKeys.length?`<div class="custom-strip">${customChips}</div>`:''}
    <div class="section-header"><h2>Today's log</h2><button class="btn-add" onclick="openLogModal(null,'${TODAY}')">+ Log food</button></div>
    <div class="entry-list">${entries}</div>`;
}

function confirmDeleteLog(dateStr,i){
  const log=getLog(dateStr);
  const name=log[i]?log[i].name:'this entry';
  confirmDialog('Remove entry','Remove "'+name+'" from this day\'s log?',()=>{
    const l=getLog(dateStr);l.splice(i,1);setLog(dateStr,l);
    if(dateStr===TODAY)renderToday();else renderHistory();
  });
}

/* ---- Other nutrient rows ---- */
let foodOtherRows=[];
function renderFoodOtherRows(){
  document.getElementById('food-other-list').innerHTML=foodOtherRows.map((r,i)=>`
    <div class="other-row">
      <input placeholder="Nutrient name" value="${r.name}" oninput="foodOtherRows[${i}].name=this.value"/>
      <input type="number" placeholder="Amount" value="${r.value}" oninput="foodOtherRows[${i}].value=this.value"/>
      <input placeholder="unit" value="${r.unit}" oninput="foodOtherRows[${i}].unit=this.value"/>
      <button class="btn-remove-other" onclick="removeOtherFood(${i})">&#10005;</button>
    </div>`).join('');
}
function addOtherFood(){foodOtherRows.push({name:'',value:'',unit:''});renderFoodOtherRows()}
function removeOtherFood(i){foodOtherRows.splice(i,1);renderFoodOtherRows()}

let ingOtherRows=[];
function renderIngOtherRows(){
  const el=document.getElementById('ing-other-list');if(!el)return;
  el.innerHTML=ingOtherRows.map((r,i)=>`
    <div class="other-row">
      <input placeholder="Nutrient name" value="${r.name}" oninput="ingOtherRows[${i}].name=this.value"/>
      <input type="number" placeholder="Amount" value="${r.value}" oninput="ingOtherRows[${i}].value=this.value"/>
      <input placeholder="unit" value="${r.unit}" oninput="ingOtherRows[${i}].unit=this.value"/>
      <button class="btn-remove-other" onclick="removeOtherIng(${i})">&#10005;</button>
    </div>`).join('');
}
function addOtherIng(){ingOtherRows.push({name:'',value:'',unit:''});renderIngOtherRows()}
function removeOtherIng(i){ingOtherRows.splice(i,1);renderIngOtherRows()}

/* ---- Log modal ---- */
let logFoodIdx=null;
let logTargetDate=TODAY;
let logSearchQuery='';

function buildLogFoodList(q){
  const foods=state.foods;
  if(!foods.length) return null;
  const lower=q.toLowerCase().trim();
  return foods.map((f,i)=>({f,i})).filter(({f})=>!lower||f.name.toLowerCase().includes(lower)||(f.servingDesc&&f.servingDesc.toLowerCase().includes(lower)));
}

function renderLogFoodList(q){
  const filtered=buildLogFoodList(q)||[];
  const list=document.getElementById('log-food-list');
  const empty=document.getElementById('log-empty-foods');
  if(!state.foods.length){list.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  list.innerHTML=filtered.map(({f,i})=>`<div class="food-select-item${logFoodIdx===i?' sel':''}" onclick="selectLogFood(${i})">
    <div class="fs-name">${f.name}${f.isPrep?' <span class=\'pill prep\'>prep</span>':''}</div>
    <div class="fs-meta">${f.isPrep&&f.totalServings?f.totalServings+' servings &middot; ':''}${ni(f.calories)} kcal${f.servingDesc?' &middot; '+f.servingDesc:''}</div>
  </div>`).join('');
}

function filterLogFoods(q){
  logSearchQuery=q;
  renderLogFoodList(q);
}

function openLogModal(prefill,dateStr){
  logFoodIdx=null;logSearchQuery='';
  logTargetDate=dateStr||TODAY;
  const isPast=logTargetDate!==TODAY;
  document.getElementById('log-modal-title').textContent=isPast?'Log food for '+fmtDateShort(logTargetDate):'Log food';
  document.getElementById('log-serving-section').style.display='none';
  document.getElementById('log-top-actions').style.display='none';
  const bottomBtn=document.getElementById('log-bottom-log-btn');
  bottomBtn.textContent='Select a food above';bottomBtn.disabled=true;bottomBtn.style.opacity='.35';bottomBtn.style.cursor='default';
  document.getElementById('log-servings-count').value=1;
  const inp=document.getElementById('log-search-input');if(inp)inp.value='';
  renderLogFoodList('');
  openModal('modal-log');
  setTimeout(()=>{const inp2=document.getElementById('log-search-input');if(inp2)inp2.focus();},100);
}

function openLogModalFromFood(foodIdx){
  openLogModal(null,TODAY);
  setTimeout(()=>selectLogFood(foodIdx),60);
}

function selectLogFood(i){
  logFoodIdx=i;const f=state.foods[i];
  // Re-render list to show selection highlight
  renderLogFoodList(logSearchQuery);
  // Show top action bar with food name
  const topActions=document.getElementById('log-top-actions');
  const selLabel=document.getElementById('log-selected-label');
  topActions.style.display='block';
  selLabel.textContent='Selected: '+f.name+(f.servingDesc?' ('+f.servingDesc+')':'');
  // Enable bottom button too
  const bottomBtn=document.getElementById('log-bottom-log-btn');
  bottomBtn.textContent='Log it';bottomBtn.disabled=false;bottomBtn.style.opacity='1';bottomBtn.style.cursor='pointer';
  if(f.isPrep){
    document.getElementById('log-serving-section').style.display='block';
    document.getElementById('log-servings-desc').textContent=f.servingDesc||'';
    document.getElementById('log-servings-count').value=1;
  } else {
    document.getElementById('log-serving-section').style.display='none';
  }
}

function saveLog(){
  if(logFoodIdx===null)return; // nothing selected
  let entry;
  const f=state.foods[logFoodIdx];
  if(f.isPrep){
    const s=parseFloat(document.getElementById('log-servings-count').value)||1;
    entry={name:f.name,serving:f.servingDesc?s+'x '+f.servingDesc:s+' serving'+(s!==1?'s':''),isPrep:true,servingsLogged:s};
    CORE_FIELDS.forEach(field=>entry[field]=(f[field]||0)*s);
    entry.other=(f.other||[]).map(o=>({...o,value:(+o.value||0)*s}));
  } else {
    entry={name:f.name,serving:f.servingDesc||'',isPrep:false};
    CORE_FIELDS.forEach(field=>entry[field]=f[field]||0);
    entry.other=(f.other||[]).map(o=>({...o}));
  }
  entry.time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const log=getLog(logTargetDate);log.push(entry);setLog(logTargetDate,log);
  closeModal('modal-log');
  if(logTargetDate===TODAY)renderToday();else renderHistory();
}

/* ---- Foods tab ---- */
let foodsQuery='';
function renderFoods(retainFocus){
  const q=foodsQuery.toLowerCase().trim();
  const matches=state.foods.filter(f=>!q||f.name.toLowerCase().includes(q)||(f.servingDesc&&f.servingDesc.toLowerCase().includes(q)));
  const html=state.foods.length===0?`<div class="empty-state">No saved foods yet.</div>`
    :matches.length===0?`<div class="empty-state">No foods match your search.</div>`
    :matches.map(f=>{
      const i=state.foods.indexOf(f);
      return `<div class="food-item">
        <div class="food-info">
          <div class="food-name">${f.name}${f.isPrep?` <span class="pill prep">${f.totalServings} servings</span>`:''}${f.isRecipe?' <span class="pill other">recipe</span>':''}</div>
          <div class="food-meta">${f.servingDesc||'per serving'} &middot; ${ni(f.calories)} kcal &middot; P${ni(f.protein)}g C${ni(f.carbs)}g F${ni(f.fat)}g${f.other&&f.other.length?' &middot; '+f.other.length+' other':''}</div>
        </div>
        <div class="food-actions">
          <button class="btn-log" onclick="logFromFood(${i})">Log</button>
          <button class="btn-edit-food" onclick="editFood(${i})">Edit</button>
          <button class="btn-duplicate-food" onclick="duplicateFood(${i})">Duplicate</button>
          <button class="btn-del-food" onclick="confirmDeleteFood(${i})">&#10005;</button>
        </div>
      </div>`;}).join('');

  // Only rebuild full tab HTML if it doesn't exist yet; otherwise just refresh the list and header
  const tab=document.getElementById('tab-foods');

function recipeTotals(){
  const acc=zeroCore();const customAcc={};
  ingredients.forEach(ing=>{
    CORE_FIELDS.forEach(f=>acc[f]+=(+ing[f]||0));
    (ing.other||[]).forEach(o=>{
      const k=o.name.toLowerCase().trim();
      if(!customAcc[k])customAcc[k]={name:o.name,unit:o.unit,val:0};
      customAcc[k].val+=+o.value||0;
    });
  });
  return{core:acc,custom:customAcc};
}

/* ---- Export / Import ---- */
function exportData(){
  const data={exportedAt:new Date().toISOString(),version:'n3'};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('n3_'))data[k]=ld(k);}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='nourish-backup-'+TODAY+'.json';a.click();URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.version!=='n3'){document.getElementById('import-note').textContent='Error: unrecognized file format.';return}
      Object.entries(data).forEach(([k,v])=>{if(k.startsWith('n3_'))sv(k,v)});
      state.foods=ld('n3_foods')||[];
      state.goals=ld('n3_goals')||{calories:2000,protein:150,carbs:200,fat:65,fiber:25,sugar:50,sodium:2300,potassium:3500,cholesterol:300,calcium:1000,vitc:90,iron:18,custom:[],vis:{...DEFAULT_VIS}};
      if(!state.goals.custom)state.goals.custom=[];
      if(!state.goals.vis)state.goals.vis={...DEFAULT_VIS};
      document.getElementById('import-note').textContent='Import successful!';render();
    }catch{document.getElementById('import-note').textContent='Error reading file.'}
  };reader.readAsText(file);
}

function renderHistory(){
  const y=histMonth.getFullYear(),m=histMonth.getMonth();
  const monthName=histMonth.toLocaleString('default',{month:'long',year:'numeric'});
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const dows=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  let cells=Array(firstDay).fill(`<div class="cal-day empty"></div>`);
  for(let d=1;d<=daysInMonth;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const hasData=getLog(ds).length>0;
    const isToday=ds===TODAY,isSel=ds===histSelectedDate;
    cells.push(`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${hasData?' has-data':''}" onclick="selectHistDate('${ds}')">
      <span class="cal-day-num">${d}</span>${hasData&&!isSel?'<div class="cal-dot"></div>':''}
    </div>`);
  }

  const selLog=getLog(histSelectedDate);
  const{core:st,custom:sc}=totalsOf(selLog);
  const selLabel=fmtDate(histSelectedDate);
  const isToday=histSelectedDate===TODAY;

  const detailEntries=selLog.length===0
    ?`<div style="color:var(--gray);font-size:13px;padding:6px 0">No entries logged.</div>`
    :selLog.map((e,i)=>`<div class="hist-entry">
      <div>
        <div class="hist-entry-name">${e.name}</div>
        ${e.serving?`<div class="hist-entry-serving">${e.serving}</div>`:''}
      </div>
      <div class="hist-entry-cals">${ni(e.calories)} kcal</div>
      <button class="btn-hist-del" onclick="confirmDeleteLog('${histSelectedDate}',${i})" title="Remove">&#10005;</button>
    </div>`).join('');

  const customChipsHist=Object.values(sc).map(c=>`<span style="font-size:12px;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:99px">${c.name}: ${n(c.val)}${c.unit}</span>`).join('');

  document.getElementById('tab-history').innerHTML=`
    <div class="cal-header">
      <button class="cal-nav" onclick="shiftMonth(-1)">&#8592;</button>
      <span style="font-weight:500">${monthName}</span>
      <button class="cal-nav" onclick="shiftMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid">${dows}${cells.join('')}</div>
    <div class="hist-detail-card">
      <div class="hist-detail-header">
        <h3>${selLabel}${isToday?' <span style="font-size:13px;color:var(--green);font-family:\'DM Sans\',sans-serif">(today)</span>':''}</h3>
        <button class="btn-add" onclick="openLogModal(null,'${histSelectedDate}')">+ Log food</button>
      </div>
      <div class="hist-detail-body">
        <div class="hist-macro-row">
          <div class="hist-macro"><div class="hm-label">Cal</div><div class="hm-val">${ni(st.calories)}</div></div>
          <div class="hist-macro"><div class="hm-label">Protein</div><div class="hm-val" style="color:var(--coral)">${ni(st.protein)}g</div></div>
          <div class="hist-macro"><div class="hm-label">Carbs</div><div class="hm-val" style="color:var(--amber)">${ni(st.carbs)}g</div></div>
          <div class="hist-macro"><div class="hm-label">Fat</div><div class="hm-val" style="color:var(--teal)">${ni(st.fat)}g</div></div>
          <div class="hist-macro"><div class="hm-label">Fiber</div><div class="hm-val">${ni(st.fiber)}g</div></div>
          <div class="hist-macro"><div class="hm-label">Sodium</div><div class="hm-val">${ni(st.sodium)}<span style="font-size:10px">mg</span></div></div>
        </div>
        ${Object.keys(sc).length?`<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px">${customChipsHist}</div>`:''}
        ${detailEntries}
      </div>
    </div>`;
}

function selectHistDate(d){histSelectedDate=d;renderHistory()}
function shiftMonth(dir){histMonth=new Date(histMonth.getFullYear(),histMonth.getMonth()+dir,1);renderHistory()}

/* ---- Nav ---- */
let activeTab='today';
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['today','foods','goals','history'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.style.display=t===tab?'block':'none';
    // Reset foods tab so search input rebuilds when revisited
    if(t==='foods'&&t!==tab)el.innerHTML='';
  });
  render();
}
function render(){
  if(activeTab==='today')renderToday();
  else if(activeTab==='foods')renderFoods();
  else if(activeTab==='goals')renderGoals();
  else if(activeTab==='history')renderHistory();
}
function openModal(id){document.getElementById(id).style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}

document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
render();
</script>
</body>
</html>
